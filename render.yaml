# Render Blueprint: one web service for frontend + backend
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: misar-ticketing-app
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
